stream_over_http_enabled: true

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
    block:
      bloom_filter_false_positive: 0.05

# Bound trace retention so /var/tempo can't grow without limit on a long-running
# stack. Explicit 7 days (Tempo's implicit default is 14d); the compactor deletes
# blocks older than this.
compactor:
  compaction:
    block_retention: 168h
