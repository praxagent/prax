server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=prax"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        target_label: "container"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"
      - source_labels: ["__meta_docker_compose_service"]
        target_label: "service"

  # Native host logs — the `make run-local-all` path runs Prax/TeamWork/etc. as
  # host processes (not containers), so Docker SD above can't see them. This job
  # tails the host's .local-run/*.log, mounted at /var/log/prax-native by the
  # promtail volume in docker-compose.yml. In the all-Docker path that mount is an
  # empty (or absent) dir, so this job simply tails nothing — harmless.
  - job_name: prax-native
    static_configs:
      - targets: ["localhost"]
        labels:
          job: prax-native
          __path__: /var/log/prax-native/*.log
    pipeline_stages:
      # Derive a `service` label from the log filename (prax.log -> prax,
      # teamwork.log -> teamwork, …) so native logs group like the container ones.
      - match:
          selector: '{job="prax-native"}'
          stages:
            - regex:
                source: filename
                expression: '/var/log/prax-native/(?P<service>[^/]+)\.log$'
            - labels:
                service:
