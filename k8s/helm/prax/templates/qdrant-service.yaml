apiVersion: v1
kind: Service
metadata:
  name: {{ include "prax.fullname" . }}-qdrant
  namespace: {{ include "prax.namespace" . }}
  labels:
    {{- include "prax.componentLabels" (dict "component" "qdrant" "context" $) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 6333
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 6334
      targetPort: grpc
      protocol: TCP
  selector:
    {{- include "prax.componentSelectorLabels" (dict "component" "qdrant" "context" $) | nindent 4 }}
