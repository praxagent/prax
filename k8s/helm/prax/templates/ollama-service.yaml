apiVersion: v1
kind: Service
metadata:
  name: {{ include "prax.fullname" . }}-ollama
  namespace: {{ include "prax.namespace" . }}
  labels:
    {{- include "prax.componentLabels" (dict "component" "ollama" "context" $) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 11434
      targetPort: http
      protocol: TCP
  selector:
    {{- include "prax.componentSelectorLabels" (dict "component" "ollama" "context" $) | nindent 4 }}
