apiVersion: v1
kind: Service
metadata:
  name: {{ include "prax.fullname" . }}-neo4j
  namespace: {{ include "prax.namespace" . }}
  labels:
    {{- include "prax.componentLabels" (dict "component" "neo4j" "context" $) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 7474
      targetPort: http
      protocol: TCP
    - name: bolt
      port: 7687
      targetPort: bolt
      protocol: TCP
  selector:
    {{- include "prax.componentSelectorLabels" (dict "component" "neo4j" "context" $) | nindent 4 }}
