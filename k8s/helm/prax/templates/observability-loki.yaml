{{- if .Values.observability.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "prax.fullname" . }}-loki
  namespace: {{ include "prax.namespace" . }}
  labels:
    {{- include "prax.componentLabels" (dict "component" "loki" "context" $) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "prax.componentSelectorLabels" (dict "component" "loki" "context" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "prax.componentLabels" (dict "component" "loki" "context" $) | nindent 8 }}
    spec:
      containers:
        - name: loki
          image: {{ .Values.observability.loki.image }}
          args:
            - "-config.file=/etc/loki/local-config.yaml"
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
          resources:
            {{- toYaml .Values.observability.loki.resources | nindent 12 }}
          volumeMounts:
            - name: loki-data
              mountPath: /loki
      volumes:
        - name: loki-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "prax.fullname" . }}-loki
  namespace: {{ include "prax.namespace" . }}
  labels:
    {{- include "prax.componentLabels" (dict "component" "loki" "context" $) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3100
      targetPort: http
      protocol: TCP
  selector:
    {{- include "prax.componentSelectorLabels" (dict "component" "loki" "context" $) | nindent 4 }}
{{- end }}
