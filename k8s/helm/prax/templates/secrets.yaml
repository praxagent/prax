apiVersion: v1
kind: Secret
metadata:
  name: {{ include "prax.fullname" . }}-secrets
  namespace: {{ include "prax.namespace" . }}
  labels:
    {{- include "prax.labels" . | nindent 4 }}
type: Opaque
stringData:
  FLASK_SECRET_KEY: {{ .Values.secrets.flaskSecretKey | quote }}
  OPENAI_KEY: {{ .Values.secrets.openaiKey | quote }}
  ANTHROPIC_KEY: {{ .Values.secrets.anthropicKey | quote }}
  GOOGLE_API_KEY: {{ .Values.secrets.googleApiKey | quote }}
  GOOGLE_CSE_ID: {{ .Values.secrets.googleCseId | quote }}
  GOOGLE_VERTEX_PROJECT: {{ .Values.secrets.googleVertexProject | quote }}
  GOOGLE_VERTEX_LOCATION: {{ .Values.secrets.googleVertexLocation | quote }}
  ELEVENLABS_API_KEY: {{ .Values.secrets.elevenlabsApiKey | quote }}
  AMADEUS_API_KEY: {{ .Values.secrets.amadeusApiKey | quote }}
  AMADEUS_API_SECRET: {{ .Values.secrets.amadeusApiSecret | quote }}
  TWILIO_ACCOUNT_SID: {{ .Values.secrets.twilioAccountSid | quote }}
  TWILIO_AUTH_TOKEN: {{ .Values.secrets.twilioAuthToken | quote }}
  DISCORD_BOT_TOKEN: {{ .Values.secrets.discordBotToken | quote }}
  NEO4J_PASSWORD: {{ .Values.secrets.neo4jPassword | quote }}
  TEAMWORK_API_KEY: {{ .Values.secrets.teamworkApiKey | quote }}
  PRAX_SSH_KEY_B64: {{ .Values.secrets.praxSshKeyB64 | quote }}
  NYT_USERNAME: {{ .Values.secrets.nytUsername | quote }}
  NYT_PASSWORD: {{ .Values.secrets.nytPassword | quote }}
