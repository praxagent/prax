apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: praxsandboxes.prax.ai
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: prax.ai
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: PraxSandbox represents a single sandbox pod in the pool.
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - instanceRef
              properties:
                instanceRef:
                  type: string
                  description: Name of the PraxInstance that owns this sandbox.
                  minLength: 1
                image:
                  type: string
                  description: Container image for the sandbox pod (overrides instance default).
                resources:
                  type: object
                  description: Resource requests and limits for the sandbox pod.
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                      additionalProperties: false
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                      additionalProperties: false
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Starting
                    - Ready
                    - Busy
                    - Draining
                    - Terminated
                  description: Current lifecycle phase of the sandbox.
                assignedUser:
                  type: string
                  nullable: true
                  description: User ID currently assigned to this sandbox, or null if free.
                podName:
                  type: string
                  description: Name of the underlying Kubernetes Pod.
                lastActivity:
                  type: string
                  format: date-time
                  description: Timestamp of the last activity in this sandbox.
                healthStatus:
                  type: string
                  enum:
                    - healthy
                    - unhealthy
                  description: Result of the last health probe.
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Instance
          type: string
          jsonPath: .spec.instanceRef
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Assigned User
          type: string
          jsonPath: .status.assignedUser
        - name: Pod
          type: string
          jsonPath: .status.podName
        - name: Health
          type: string
          jsonPath: .status.healthStatus
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: praxsandboxes
    singular: praxsandbox
    kind: PraxSandbox
    shortNames:
      - ps
