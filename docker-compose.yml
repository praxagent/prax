name: prax

services:
  ngrok:
    image: ngrok/ngrok:latest
    command: http app:5001
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"

  app:
    build: .
    entrypoint: ["bash", "scripts/entrypoint.sh"]
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      - NGROK_API_URL=http://ngrok:4040
      - RUNNING_IN_DOCKER=true
      - SANDBOX_HOST=sandbox
      # Playwright connects to the sandbox Chrome instead of launching its own.
      # This unifies the agent's browser with TeamWork's screencast.
      - BROWSER_CDP_URL=http://sandbox:9223
      # Override WORKSPACE_DIR from .env — inside the container the mount
      # point is always /app/workspaces regardless of the host path.
      - WORKSPACE_DIR=./workspaces
      # TeamWork integration — Prax controls TeamWork as an external agent.
      - TEAMWORK_URL=http://teamwork:8000
      - TEAMWORK_API_KEY=${TEAMWORK_API_KEY:-}
      - TEAMWORK_USER_PHONE=${TEAMWORK_USER_PHONE:-}
      # Memory infrastructure — overrides .env when running in Docker.
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      # Ollama — when EMBEDDING_PROVIDER=ollama, embeddings use this endpoint.
      - OLLAMA_BASE_URL=http://ollama:11434
      # OTel exporter — sends traces to Tempo when observability is enabled.
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - GRAFANA_URL=${GRAFANA_URL:-http://localhost:3001}
    volumes:
      - ./conversations.db:/app/conversations.db
      - ./static:/app/static
      - ./logs:/app/logs
      - ${WORKSPACE_DIR:-../workspaces}:/app/workspaces
      # Dev: mount source for live reload without rebuilding the image.
      - ./prax:/app/prax
      - ./app.py:/app/app.py
      - ./config.py:/app/config.py:ro
      # Git repo — required for self-improve worktree isolation.
      - ./.git:/app/.git:ro
      - ./tests:/app/tests:ro
      # Required for sandbox package installation (docker exec).
      # SECURITY: grants host Docker access — use only in trusted environments.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      ngrok:
        condition: service_started
      sandbox:
        condition: service_healthy
      teamwork:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      ollama:
        condition: service_healthy

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: prax-sandbox:latest
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_KEY}
      - OPENAI_API_KEY=${OPENAI_KEY}
      - CLAUDE_CODE_DISABLE_NONINTERACTIVE_CHECK=1
    volumes:
      - ${WORKSPACE_DIR:-../workspaces}:/workspaces
      # Full repo mount — coding agents (Claude Code, Codex, OpenCode) need
      # read-write access to the codebase for self-improvement tasks.
      # Secrets are passed via environment vars, not .env.
      - .:/source
      # Coding agent configs — stored in workspace so they survive rebuilds.
      - ${WORKSPACE_DIR:-../workspaces}/.claude:/root/.claude
      - ${WORKSPACE_DIR:-../workspaces}/.codex:/root/.codex
      - ${WORKSPACE_DIR:-../workspaces}/.opencode:/root/.config/opencode
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4096/global/health"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 5

  # ---- TeamWork (web UI for Prax) ----
  # Slack-like interface: chat, file browser, task board, terminal.
  # Prax controls it via the external agent API.
  # Single container — API + bundled React frontend served by FastAPI.

  teamwork:
    build:
      context: ${TEAMWORK_PATH:-../teamwork}
      dockerfile: Dockerfile
    restart: unless-stopped
    # Grant Docker socket access for terminal (exec into sandbox).
    # GID 0 = root group, which owns the socket on macOS Docker Desktop.
    group_add: ["0"]
    ports:
      - "3000:8000"
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/vteam.db
      - WORKSPACE_PATH=/workspace
      - HOST_WORKSPACE_PATH=${HOST_WORKSPACE_PATH:-}
      - EXTERNAL_API_KEY=${TEAMWORK_API_KEY:-}
      - SANDBOX_CONTAINER=${SANDBOX_CONTAINER:-prax-sandbox-1}
      - CHROME_CDP_HOST=sandbox
      - CHROME_CDP_PORT=9223
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]
      # Prax app URL — required for plugin management proxy.
      - PRAX_URL=http://app:5001
    volumes:
      - ${WORKSPACE_DIR:-../workspaces}/.teamwork:/app/data
      - ${WORKSPACE_DIR:-../workspaces}:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---- Memory Infrastructure ----
  # Qdrant (vector store) and Neo4j (graph DB) for long-term memory.
  # Always on — Prax is nothing without his memory.

  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - ${WORKSPACE_DIR:-../workspaces}/.qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-prax-memory}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_usage__report_enabled=false
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - ${WORKSPACE_DIR:-../workspaces}/.neo4j:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7474/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- Ollama (local embeddings + LLM) ----
  # Local inference — embeddings and/or chat models without sending data
  # to external APIs. Set LLM_PROVIDER=ollama to use for chat,
  # EMBEDDING_PROVIDER=ollama to use for embeddings.
  # The configured model is auto-pulled on first start.

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ${WORKSPACE_DIR:-../workspaces}/.ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Sidecar that waits for Ollama to be healthy, then pulls the
  # configured embedding model so users don't have to do it manually.
  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling embedding model: ${EMBEDDING_MODEL:-nomic-embed-text}..."
        curl -s http://ollama:11434/api/pull -d "{\"model\": \"${EMBEDDING_MODEL:-nomic-embed-text}\"}"
        echo ""
        echo "Model pull complete."

  # ---- Observability Stack ----
  # Start with: COMPOSE_PROFILES=observability docker compose up
  # Or: docker compose --profile observability up

  # Tempo — distributed tracing backend (receives OTLP spans from Prax)
  tempo:
    image: grafana/tempo:2.7.2
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo query API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  # Loki — log aggregation (receives logs from Promtail)
  loki:
    image: grafana/loki:3.4.2
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki

  # Promtail — ships Docker container logs to Loki
  promtail:
    image: grafana/promtail:3.4.2
    profiles: ["observability"]
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./observability/promtail.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Docker log files — Promtail uses the socket for discovery but
      # needs the actual log files to read container output.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

  # Prometheus — metrics (scrapes /metrics from Prax)
  prometheus:
    image: prom/prometheus:v3.2.1
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  # Grafana — unified dashboards (traces + logs + metrics)
  # Port 3001 since TeamWork already uses 3000.
  grafana:
    image: grafana/grafana:11.5.2
    profiles: ["observability"]
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=prax
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - tempo
      - loki
      - prometheus

volumes:
  # Observability data — ephemeral, fine as Docker volumes.
  # All persistent data (memory, models, agent configs) lives in WORKSPACE_DIR.
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:
