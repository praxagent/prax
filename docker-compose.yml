name: prax

services:
  ngrok:
    image: ngrok/ngrok:latest
    command: http app:5001
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"

  app:
    build: .
    entrypoint: ["bash", "scripts/entrypoint.sh"]
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      - NGROK_API_URL=http://ngrok:4040
      - RUNNING_IN_DOCKER=true
      - SANDBOX_HOST=sandbox
      # Override WORKSPACE_DIR from .env — inside the container the mount
      # point is always /app/workspaces regardless of the host path.
      - WORKSPACE_DIR=./workspaces
      # TeamWork integration — Prax controls TeamWork as an external agent.
      - TEAMWORK_URL=http://teamwork:8000
      - TEAMWORK_API_KEY=${TEAMWORK_API_KEY:-}
      - TEAMWORK_USER_PHONE=${TEAMWORK_USER_PHONE:-}
    volumes:
      - ./conversations.db:/app/conversations.db
      - ./static:/app/static
      - ./logs:/app/logs
      - ${WORKSPACE_DIR:-./workspaces}:/app/workspaces
      # Required for sandbox package installation (docker exec).
      # SECURITY: grants host Docker access — use only in trusted environments.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      ngrok:
        condition: service_started
      sandbox:
        condition: service_healthy
      teamwork:
        condition: service_healthy

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: prax-sandbox:latest
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_KEY}
      - OPENAI_API_KEY=${OPENAI_KEY}
    volumes:
      - ${WORKSPACE_DIR:-./workspaces}:/workspaces
      - ./prax:/source/prax:ro
      - ./app.py:/source/app.py:ro
      - ./config.py:/source/config.py:ro
      - ./tests:/source/tests:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4096/global/health"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 5

  # ---- TeamWork (web UI for Prax) ----
  # Slack-like interface: chat, file browser, task board, terminal.
  # Prax controls it via the external agent API.
  # Single container — API + bundled React frontend served by FastAPI.

  teamwork:
    build:
      context: ${TEAMWORK_PATH:-../teamwork}
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:8000"
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/vteam.db
      - WORKSPACE_PATH=/workspace
      - HOST_WORKSPACE_PATH=${HOST_WORKSPACE_PATH:-}
      - EXTERNAL_API_KEY=${TEAMWORK_API_KEY:-}
      - SANDBOX_CONTAINER=${SANDBOX_CONTAINER:-prax-sandbox-1}
      - CHROME_CDP_HOST=sandbox
      - CHROME_CDP_PORT=9223
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]
    volumes:
      - ${WORKSPACE_DIR:-./workspaces}/.teamwork:/app/data
      - ${WORKSPACE_DIR:-./workspaces}:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
