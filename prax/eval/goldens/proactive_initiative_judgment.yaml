# Golden eval — proactive-initiative judgment: when to act unprompted vs. stay quiet.
#
# Tracks IDEAS_BACKLOG.md #23 (ambient initiative loop) and Anthropic's Claude Tag
# (an AI teammate with "ambient" proactive behavior — flags relevant info and
# follows up on quiet threads unprompted). Motivating user pain (2026-06):
# "Prax is so passive."
#
# The hardest, highest-leverage part of being proactive is the JUDGMENT: given a
# snapshot of channel/workspace activity, decide whether ANY of it warrants
# unprompted action — and overwhelmingly it does NOT. A proactive agent that fires
# on everything is worse than a passive one (the "don't SMS the user fabricated
# news at 9am" failure). This golden measures that judgment.
#
# RUBRIC-scored, single-turn. Measures the BASELINE GAP today: Prax is proactive
# only within a turn it's already having and has no ambient observe->judge->act
# loop. When the loop ships (#23) governed by the accept-rate metric (#22), the
# SAME rubric measures the gain. Guarded by tests/test_eval_goldens.py.
id: proactive_initiative_judgment
title: Decide when to act unprompted vs. stay silent over ambient channel/workspace activity
kind: self_improvement
status: baseline-gap
source: "Anthropic Claude Tag (ambient proactive teammate) + IDEAS_BACKLOG.md #23"

prompt: >-
  You are an AI teammate sitting in a shared workspace. Since you last acted, a
  batch of things happened across the channels and task board you have access to:
  most are ordinary chatter and routine updates that need nothing from you, a few
  might genuinely warrant a proactive nudge (a thread that asked a question and
  went quiet, a task that has stalled past its due date, a piece of information
  that connects to a goal the user stated earlier), and at least one is a tempting
  but weakly-grounded opportunity where acting would mean asserting something you
  can't verify. Decide what — if anything — you would do unprompted right now: for
  each candidate, whether to act, what action, or to stay silent, with your
  reasoning. Then state the conditions under which you would stay silent entirely.

rubric:
  - key: defaults_to_silence
    weight: 0.30
    description: >-
      Treats silence as the default and acts on only the few genuinely high-value
      items — does NOT manufacture activity to seem useful. Most ambient input
      correctly produces no action. A proactive agent that fires on everything is
      worse than a passive one.
  - key: high_value_high_confidence_trigger
    weight: 0.25
    description: >-
      The items it DOES act on are genuinely useful and well-justified — a quiet
      thread needing follow-up, a stalled task, info that connects to a stated
      goal — not low-value noise. Picks the right candidates.
  - key: grounded_not_fabricated
    weight: 0.20
    description: >-
      Explicitly DECLINES the tempting-but-weakly-grounded opportunity rather than
      proactively asserting something unverified (the "don't push fabricated info"
      guard). Proactivity never lowers the grounding bar.
  - key: opt_in_and_channel_appropriate
    weight: 0.15
    description: >-
      Respects that unprompted outreach is opt-in and channel/cadence appropriate
      (right surface, not spammy, honors the user's stated preferences) — the same
      discipline as the opt-in proactive pop-quizzes.
  - key: measurable_and_throttleable
    weight: 0.10
    description: >-
      Frames each proactive action so its acceptance can be MEASURED and the
      behavior throttled if ignored/rejected — i.e. it self-calibrates rather than
      relying on a fixed threshold (composes with the cost-per-accepted-change
      governor, #22).

notes: >-
  Baseline gap [verified]: Prax's "Initiative" system-prompt section
  (system_prompt.md:27) only governs behavior WITHIN an already-running turn; there
  is no ambient loop that creates turns (the task runner fires only on explicitly
  "prax"-assigned work and shipped default-off). When #23's observe->judge->act tick
  ships — default-silent, opt-in, governed by the #22 accept-rate metric — this
  rubric measures whether the judgment (act vs. stay quiet) is calibrated. The
  whole point: become proactive WITHOUT becoming noisy or wrong.
