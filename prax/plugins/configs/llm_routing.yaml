# LLM routing configuration — which model/provider/tier to use per component.
#
# The agent can modify this file at runtime to switch models or tiers.
# Each key is a component name; values override the global defaults
# from settings (LLM_PROVIDER, BASE_MODEL, AGENT_TEMPERATURE).
#
# Supported providers: openai, anthropic, google, ollama, vllm
# Supported tiers:     low, medium, high, pro
#
# Tier vs model: set "tier" to use the tiered system (recommended),
# or set "model" to override with a specific model name.
# If both are set, "model" takes precedence.

defaults:
  provider: null   # null = use env LLM_PROVIDER
  model: null      # null = resolved via tier
  tier: null       # null = use component default (low for orchestrator, etc.)
  temperature: null  # null = use env AGENT_TEMPERATURE

components:
  orchestrator:
    tier: medium         # Prax main loop — medium to handle 54K system prompt + 35 tools
    temperature: 0.7

  subagent_research:
    tier: high           # research sub-agent — reads sources, writes reports with citations
    temperature: 0.3

  subagent_knowledge:
    tier: high           # note synthesis — MUST be high or better, nano produces raw dumps
    temperature: 0.5

  subagent_content_writer:
    tier: high           # blog post writing — needs real composition ability
    temperature: 0.6

  subagent_content_reviewer:
    tier: high           # adversarial review — cross-provider diversity via llm_factory
    temperature: 0.3

  subagent_note_writer:
    tier: high           # deep-dive note synthesis — high tier floor
    temperature: 0.5

  note_quality_reviewer:
    tier: low            # cheap JSON classifier — yes/no approval
    temperature: 0.2

  subagent_professor:
    tier: pro            # multi-model consensus — uses expensive pro models
    temperature: 0.3

