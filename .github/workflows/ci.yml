name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FLASK_SECRET_KEY: "ci-test-key"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # The sandbox tooling lives in a sibling repo, consumed via the
      # `prax-sandbox` editable path source (../prax-sandbox) in pyproject.toml.
      # uv needs it on disk to generate package metadata during `uv sync`.
      - name: Checkout prax-sandbox (sibling path dependency)
        run: git clone --depth 1 https://github.com/praxagent/prax-sandbox.git ../prax-sandbox

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest tests/ -x -q
