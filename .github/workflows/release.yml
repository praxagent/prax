name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4.2.2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          release-type: python
