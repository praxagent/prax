name: Release
on:
  push:
    branches: [main]
  # Manual re-run: refresh/recreate the release PR without needing a push
  # (e.g. after changing release config or the RELEASE_PLEASE_TOKEN secret).
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          # Prefer a PAT when configured: PRs opened with the default
          # GITHUB_TOKEN don't trigger workflows (anti-recursion), so the
          # required `test` check never runs on release PRs and they sit
          # unmergeable until nudged (close/reopen). With a fine-grained PAT
          # (contents + pull-requests: write) release PRs run CI like any
          # other PR. Falls back to the default token when the secret is
          # absent — identical to prior behavior.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          # Manifest mode: state lives in release-please-config.json +
          # .release-please-manifest.json (defaults). Do NOT set release-type
          # here — that forces legacy simple mode, which re-derives the version
          # from old GitHub Releases each run and collided with the pre-reset
          # v0.1.0–v0.16.0 tags.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
