name: prax

services:
  prax:
    build:
      context: .
      dockerfile: Dockerfile.lite
      additional_contexts:
        teamwork: ${TEAMWORK_PATH:-../teamwork}
        prax-sandbox: ${PRAX_SANDBOX_PATH:-../prax-sandbox}
    entrypoint: ["bash", "scripts/entrypoint-lite.sh"]
    ports:
      - "3000:8000"   # TeamWork web UI
      - "8000:8000"   # TeamWork API (for Vite dev proxy)
      - "5001:5001"   # Prax API
      - "4040:4040"   # ngrok dashboard (optional)
    env_file: .env
    environment:
      - PRAX_USER_ID=${PRAX_USER_ID:-}
      - TEAMWORK_API_KEY=${TEAMWORK_API_KEY:-}
      - TEAMWORK_USER_PHONE=${TEAMWORK_USER_PHONE:-}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-prax-memory}
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
      - SANDBOX_HOST=sandbox
    group_add: ["0"]
    volumes:
      - ${WORKSPACE_DIR:-../workspaces}:/app/workspaces
      # Service data stored in the user's workspace — visible, portable, backed up.
      - ${WORKSPACE_DIR:-../workspaces}/${PRAX_USER_ID}/.services/qdrant:/data/qdrant
      - ${WORKSPACE_DIR:-../workspaces}/${PRAX_USER_ID}/.services/neo4j:/data/neo4j
      - ${WORKSPACE_DIR:-../workspaces}/${PRAX_USER_ID}/.services/teamwork:/data/teamwork
      - ./logs:/app/logs
      # Dev mounts
      - ./prax:/app/prax
      - ./app.py:/app/app.py
      - ./scripts:/app/scripts
      - ./.git:/app/.git:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      sandbox:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

  # Image source lives in the sibling prax-sandbox repo (override with
  # PRAX_SANDBOX_PATH).  `docker compose up --build` builds it automatically.
  sandbox:
    build:
      context: ${PRAX_SANDBOX_PATH:-../prax-sandbox}/sandbox
    image: prax-sandbox:latest
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_KEY}
      - OPENAI_API_KEY=${OPENAI_KEY}
      - CLAUDE_CODE_DISABLE_NONINTERACTIVE_CHECK=1
    volumes:
      - ${WORKSPACE_DIR:-../workspaces}/${PRAX_USER_ID}:/workspace
      - .:/source
      - ${WORKSPACE_DIR:-../workspaces}/${PRAX_USER_ID}/.sandbox/home:/root
      - ${WORKSPACE_DIR:-../workspaces}/${PRAX_USER_ID}/.sandbox/claude:/root/.claude
      - ${WORKSPACE_DIR:-../workspaces}/${PRAX_USER_ID}/.sandbox/codex:/root/.codex
      - ${WORKSPACE_DIR:-../workspaces}/${PRAX_USER_ID}/.sandbox/opencode:/root/.config/opencode
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4096/global/health"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 5

  # ── Tailscale sidecar (optional, same as the full stack) ──────────────
  # Skipped unless COMPOSE_PROFILES=tailscale (and TS_AUTHKEY is set). Exposes
  # TeamWork (prax:8000) over the tailnet at https://<host>.<tailnet>.ts.net/.
  # Lite has no Grafana, so the :3001 route in serve-config.json has no backend
  # (harmless — the :443 TeamWork route is what matters).
  tailscale:
    image: tailscale/tailscale:latest
    profiles: ["tailscale"]
    hostname: tailscale-sidecar
    cap_add:
      - net_admin
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?TS_AUTHKEY is required when the tailscale profile is active — see https://login.tailscale.com/admin/settings/keys}
      - TS_HOSTNAME=${TS_HOSTNAME:-prax}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve-config.json
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:-}
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale/serve-config.json:/config/serve-config.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status", "--peers=false"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  # Tailscale node state — keeps the same device identity across restarts.
  tailscale-state:
